<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Session - Learn Math with James</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a2e;
            min-height: 100vh;
            padding: 20px;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 20px;
        }

        .status {
            font-size: 18px;
            color: #4CAF50;
            margin-bottom: 30px;
        }

        .controls {
            display: flex;
            gap: 15px;
        }

        .control-btn {
            padding: 20px 40px;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-whiteboard {
            background-color: #4CAF50;
            color: white;
        }

        .btn-whiteboard:hover {
            background-color: #45a049;
        }

        .btn-end {
            background-color: #f44336;
            color: white;
        }

        .btn-end:hover {
            background-color: #d32f2f;
        }

        .back {
            margin-top: 20px;
            color: #999;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <h1>Math Session</h1>
    <p class="status" id="status">Connecting audio...</p>

    <div class="controls">
        <button class="control-btn btn-whiteboard" onclick="goWhiteboard()">
            ✏️ Open Whiteboard
        </button>
        <button class="control-btn btn-end" onclick="endSession()">
            📞 End Session
        </button>
    </div>

    <script src="https://cdn.socket.io/4.8.3/socket.io.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const sessionDate = urlParams.get('date');
        const sessionHour = urlParams.get('hour');
        const isTutor = urlParams.get('tutor') === 'true';
        const statusEl = document.getElementById('status');

        let peer = null;
        let audioStream = null;
        let currentCall = null;

        // Tutor peer ID format: "session-{date}-{hour}"
        const tutorPeerId = 'session-' + sessionDate + '-' + sessionHour;

        // Initialize audio
        async function initAudio() {
            try {
                audioStream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true
                    }
                });
            } catch (err) {
                console.warn('Mic not available:', err);
                audioStream = null;
            }
        }

        // Tutor: create peer and wait for connections
        function setupTutor() {
            peer = new Peer(tutorPeerId);

            peer.on('open', (id) => {
                statusEl.textContent = 'Waiting for student to connect...';
            });

            peer.on('call', (call) => {
                // Answer with our audio stream
                call.answer(audioStream);
                currentCall = call;

                call.on('stream', (remoteStream) => {
                    playAudio(remoteStream);
                    statusEl.textContent = 'Connected! Click "Open Whiteboard" to start.';
                });

                call.on('close', () => {
                    statusEl.textContent = 'Student disconnected. Waiting...';
                });
            });

            peer.on('error', (err) => {
                console.error('Peer error:', err);
                statusEl.textContent = 'Connection error. Refresh to retry.';
            });
        }

        // Student: connect to tutor's peer
        function setupStudent() {
            peer = new Peer();

            peer.on('open', (id) => {
                statusEl.textContent = 'Connecting to tutor...';

                // Call tutor
                const call = peer.call(tutorPeerId, audioStream);
                currentCall = call;

                call.on('stream', (remoteStream) => {
                    playAudio(remoteStream);
                    statusEl.textContent = 'Connected! Click "Open Whiteboard" to start.';
                });

                call.on('close', () => {
                    statusEl.textContent = 'Tutor disconnected. Refresh to retry.';
                });

                call.on('error', (err) => {
                    console.error('Call error:', err);
                    statusEl.textContent = 'Could not connect. Tutor may not be online.';
                });
            });

            peer.on('error', (err) => {
                console.error('Peer error:', err);
                statusEl.textContent = 'Could not find tutor. They may not be in session.';
            });
        }

        // Play remotely received audio
        let audioInitialized = false;

        function playAudio(stream) {
            if (!stream) return;
            let audio = document.getElementById('remoteAudio');
            if (!audio) {
                audio = document.createElement('audio');
                audio.id = 'remoteAudio';
                audio.autoplay = true;
                audio.playsInline = true;
                document.body.appendChild(audio);
            }
            audio.srcObject = stream;
            audio.play().catch(e => console.log('Autoplay blocked, click to enable'));
        }

        // Enable audio on first user interaction (required by browsers)
        document.body.addEventListener('click', () => {
            const audio = document.getElementById('remoteAudio');
            if (audio && !audioInitialized) {
                audio.play().then(() => { audioInitialized = true; }).catch(e => {});
            }
        }, { once: true });

        async function connectAudio() {
            await initAudio();

            if (isTutor) {
                setupTutor();
            } else {
                setupStudent();
            }
        }

        function goWhiteboard() {
            // Stop local audio tracks before navigating (keeps mic for whiteboard page)
            // Destroy peer so PeerJS server frees the ID, then navigate
            if (currentCall) {
                currentCall.close();
                currentCall = null;
            }
            if (peer) {
                peer.destroy();
                peer = null;
            }
            // Small delay to let PeerJS server process the disconnect before navigating
            setTimeout(() => {
                window.location.href = 'whiteboard.html?date=' + sessionDate + '&hour=' + sessionHour + '&tutor=' + isTutor;
            }, 300);
        }

        function endSession() {
            if (confirm('End this session?')) {
                if (audioStream) {
                    audioStream.getTracks().forEach(track => track.stop());
                }
                if (peer) {
                    peer.destroy();
                }
                window.location.href = isTutor ? 'tutor_dashboard.html' : 'dashboard.html';
            }
        }

        // Clean up peer when leaving the page
        window.addEventListener('beforeunload', () => {
            if (currentCall) {
                currentCall.close();
                currentCall = null;
            }
            if (peer) {
                peer.destroy();
                peer = null;
            }
            if (audioStream) {
                audioStream.getTracks().forEach(t => t.stop());
            }
        });

        connectAudio();
    </script>
</body>
</html>
