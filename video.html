<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Session - Learn Math with James</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a2e;
            min-height: 100vh;
            padding: 20px;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 20px;
        }

        .status {
            font-size: 18px;
            color: #4CAF50;
            margin-bottom: 30px;
        }

        .controls {
            display: flex;
            gap: 15px;
        }

        .control-btn {
            padding: 20px 40px;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-whiteboard {
            background-color: #4CAF50;
            color: white;
        }

        .btn-whiteboard:hover {
            background-color: #45a049;
        }

        .btn-end {
            background-color: #f44336;
            color: white;
        }

        .btn-end:hover {
            background-color: #d32f2f;
        }

        .back {
            margin-top: 20px;
            color: #999;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <h1>Math Session</h1>
    <p class="status" id="status">Connecting audio...</p>

    <div class="controls">
        <button class="control-btn btn-whiteboard" onclick="goWhiteboard()">
            ✏️ Open Whiteboard
        </button>
        <button class="control-btn btn-end" onclick="endSession()">
            📞 End Session
        </button>
    </div>

    <script src="https://cdn.socket.io/4.8.3/socket.io.min.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const sessionDate = urlParams.get('date');
        const sessionHour = urlParams.get('hour');
        const isTutor = urlParams.get('tutor') === 'true';
        const statusEl = document.getElementById('status');

        const socket = io();
        let audioStream = null;

        // Automatically connect audio on page load
        async function connectAudio() {
            try {
                audioStream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true
                    }
                });

                // Connect to audio room
                const roomId = sessionDate + '-' + sessionHour;
                socket.emit('join-audio', roomId);

                statusEl.textContent = 'Connected! Click "Open Whiteboard" to start.';

                // Send audio to other participants
                // (In production, you'd use WebRTC for peer-to-peer audio)
            } catch (err) {
                console.error('Audio error:', err);
                statusEl.textContent = 'Audio could not connect. You can still use the whiteboard.';
            }
        }

        function goWhiteboard() {
            window.location.href = 'whiteboard.html?date=' + sessionDate + '&hour=' + sessionHour + '&tutor=' + isTutor;
        }

        function endSession() {
            if (confirm('End this session?')) {
                if (audioStream) {
                    audioStream.getTracks().forEach(track => track.stop());
                }
                window.location.href = isTutor ? 'tutor_dashboard.html' : 'dashboard.html';
            }
        }

        connectAudio();
    </script>
</body>
</html>
